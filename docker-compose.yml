services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dpss_subscriber_requests
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dpss_subscriber_requests"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: node db/migrate.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/dpss_subscriber_requests
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "3012:3012"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/dpss_subscriber_requests
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
